name: Build XTrader Signal Bridge EXE

on:
  # Build EXE NON automatico a ogni push su main: un EXE (~decine di MB, retention 30gg)
  # caricato a ogni commit riempirebbe la quota storage artifact di GitHub. Si lancia a
  # MANO da Actions → «Run workflow» (workflow_dispatch), oppure automaticamente su un tag
  # di release `v*`. La build resta comunque fail-closed (i test girano prima e sono
  # bloccanti): cambia solo QUANDO parte, non COME.
  push:
    tags: [ "v*" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

    - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
      with:
        python-version: '3.11'

    - name: Installa Dipendenze
      # Build riproducibile (A7): se `requirements-build.lock` è committato, si installa
      # SOLO da lì con `--require-hashes` (versioni+hash bloccati, generati su Windows dal
      # workflow "Generate Windows Lockfile"). Finché il lock non è presente, si usa
      # l'install legacy così la build non si rompe — passerà automaticamente al lock
      # appena committato. Il lock include runtime + pytest + pyinstaller + httpx, quindi
      # copre anche lo step dei test e la compilazione dell'EXE.
      shell: pwsh
      run: |
        if (Test-Path "requirements-build.lock") {
          # Ramo riproducibile: NON aggiornare pip a "latest" qui. Un `pip install --upgrade pip`
          # tirerebbe la pip piu' recente da PyPI al momento della build, re-introducendo un
          # componente NON deterministico proprio nel ramo che vuole essere riproducibile. Si usa
          # invece la pip gia' inclusa nel Python 3.11 pinnato da setup-python (versione fissa),
          # che installa benissimo il set con `--require-hashes` (Codex).
          Write-Host "requirements-build.lock trovato: install riproducibile con --require-hashes."
          python -m pip install --require-hashes -r requirements-build.lock
        } else {
          # Ramo legacy (lock non ancora committato): qui l'aggiornamento di pip è utile e
          # innocuo perché l'install non è comunque bloccato.
          python -m pip install --upgrade pip
          Write-Warning "requirements-build.lock assente: install legacy (passera' a --require-hashes appena il lock generato dalla CI Windows sara' committato)."
          python -m pip install -r requirements-dev.txt pyinstaller httpx
        }

    - name: Verifica compilazione (compileall)
      run: python -m compileall main.py xtrader_bridge tests

    - name: Esegui i test (bloccante)
      run: python -m pytest -m "not manual"

    - name: Versione app + data build (nome artifact)
      id: meta
      shell: bash
      run: |
        # Versione dall'UNICA fonte di verità (xtrader_bridge/__init__.py); fail
        # se manca, così l'artifact non finisce mai senza versione.
        # `sys.stdout.write` (niente newline) + `tr -d '\r\n'`: su windows-latest il
        # print() di Python emette CRLF e $(...) toglie solo \n, lasciando un \r che
        # renderebbe il nome artifact malformato (`...v0.1.0\r-<data>`). Stripping
        # difensivo di CR/LF così il nome resta pulito su ogni runner.
        ver=$(python -c "import sys, xtrader_bridge as p; sys.stdout.write(p.__version__)" | tr -d '\r\n')
        [ -n "$ver" ] || { echo "::error::__version__ mancante"; exit 1; }
        date=$(date -u +%Y%m%d)
        echo "version=$ver"          >> "$GITHUB_OUTPUT"
        echo "build_date=$date"      >> "$GITHUB_OUTPUT"
        echo "artifact=XTrader-Signal-Bridge-Windows-v${ver}-${date}" >> "$GITHUB_OUTPUT"

    - name: Compila EXE con PyInstaller
      run: >
        pyinstaller --onefile --windowed
        --name "XTrader-Signal-Bridge"
        --paths .
        --collect-submodules xtrader_bridge
        --add-data "data/dizionario_xtrader.csv;data"
        --collect-all customtkinter
        --hidden-import=telegram
        --hidden-import=telegram.ext
        --hidden-import=telegram.ext._application
        --hidden-import=telegram.ext._updater
        --hidden-import=httpx
        --hidden-import=httpcore
        main.py

    - name: Carica EXE come Artifact (sempre scaricabile)
      # Nome artifact versionato (versione + data build) per tracciabilità; il file
      # .exe interno resta `XTrader-Signal-Bridge.exe` così l'utente lo ritrova uguale.
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
      with:
        name: ${{ steps.meta.outputs.artifact }}
        path: dist/XTrader-Signal-Bridge.exe
        # Retention breve: l'EXE è un output di build usa-e-scarica; tenerlo 30gg riempiva la
        # quota storage. Gli EXE di RELEASE restano comunque nelle GitHub Releases (storage
        # separato, non-scadente). Pulizia extra: workflow `cleanup-artifacts.yml`.
        retention-days: 7

    - name: Crea Release pubblica (solo su tag v*)
      # SHA pin di softprops/action-gh-release corrispondente al tag major v1 al momento
      # del pin (immutabile: la SHA non cambia se il tag mobile v1 viene riassegnato).
      # Aggiornare SHA e commento INSIEME quando si fa il bump. Audit L8.
      uses: softprops/action-gh-release@de2c0eb89ae2a093876385947365aca7b0e5f844  # v1
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: dist/XTrader-Signal-Bridge.exe

  # ── Build Linux (#36 PR-A) ─────────────────────────────────────────────────────
  # Job PARALLELO e ADDITIVO al build Windows sopra (che resta INVARIATO): produce un
  # binario Linux PyInstaller onefile self-contained («scarica ed esegui»), scaricabile
  # dagli Artifacts esattamente come l'EXE. Nessuna modifica alla logica del bridge: la
  # stessa app gira identica su Windows e Linux (la logica ha già i rami POSIX). La firma
  # e il wrapping in AppImage sono un follow-up separato (PR-B). L'anello che consuma il
  # CSV (XTrader) resta Windows: questo artifact fa girare il BRIDGE su Linux.
  build-linux:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

    - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
      with:
        python-version: '3.11'

    - name: Verifica Tk disponibile (fail-closed)
      # La GUI (customtkinter→tkinter) richiede _tkinter nel Python che compila il binario,
      # altrimenti l'artifact Linux si avvierebbe senza interfaccia. I build standalone di
      # setup-python includono già tkinter; se un giorno non fosse così questo step FALLISCE
      # subito con un messaggio chiaro, invece di produrre un binario rotto (fail-closed).
      run: python -c "import tkinter; print('Tk', tkinter.TkVersion)"

    - name: Installa Dipendenze (lock Linux con hash se disponibile; altrimenti legacy)
      # Riproducibile e self-healing (stessa logica del job Windows): se
      # `requirements-build-linux.lock` è committato (generato da "Generate Linux Lockfile"
      # su ubuntu), si installa SOLO da lì con `--require-hashes` (versioni+hash bloccati →
      # build riproducibile, supply-chain verificata). NB: NON si usa `requirements-build.lock`
      # (Windows): i suoi hash sono di wheel Windows e su Linux `--require-hashes` fallirebbe.
      # Finché il lock Linux non è committato, si usa l'install legacy così la build non si
      # rompe — passerà automaticamente al lock appena committato.
      run: |
        if [ -f requirements-build-linux.lock ]; then
          echo "requirements-build-linux.lock trovato: install riproducibile con --require-hashes."
          python -m pip install --require-hashes -r requirements-build-linux.lock
        else
          echo "::warning::requirements-build-linux.lock assente: install legacy (passera' a --require-hashes appena il lock generato dalla CI Linux sara' committato)."
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt pyinstaller httpx
        fi

    - name: Verifica compilazione (compileall)
      run: python -m compileall main.py xtrader_bridge tests

    - name: Esegui i test (bloccante)
      run: python -m pytest -m "not manual"

    - name: Versione app + data build (nome artifact)
      id: meta
      run: |
        # Stessa fonte di verità del job Windows (xtrader_bridge/__init__.py), fail se manca.
        ver=$(python -c "import sys, xtrader_bridge as p; sys.stdout.write(p.__version__)" | tr -d '\r\n')
        [ -n "$ver" ] || { echo "::error::__version__ mancante"; exit 1; }
        date=$(date -u +%Y%m%d)
        echo "version=$ver"     >> "$GITHUB_OUTPUT"
        echo "build_date=$date" >> "$GITHUB_OUTPUT"
        echo "artifact=XTrader-Signal-Bridge-Linux-v${ver}-${date}" >> "$GITHUB_OUTPUT"

    - name: Compila binario Linux con PyInstaller
      # onefile self-contained. Differenze dal job Windows: `--add-data` usa `:` come
      # separatore (su Windows è `;`); `--windowed` è una flag Windows/macOS e su Linux non
      # ha effetto → omessa. Tutto il resto (paths, submodules, data, hidden-import) è identico.
      run: >
        pyinstaller --onefile
        --name "XTrader-Signal-Bridge"
        --paths .
        --collect-submodules xtrader_bridge
        --add-data "data/dizionario_xtrader.csv:data"
        --collect-all customtkinter
        --hidden-import=telegram
        --hidden-import=telegram.ext
        --hidden-import=telegram.ext._application
        --hidden-import=telegram.ext._updater
        --hidden-import=httpx
        --hidden-import=httpcore
        main.py

    - name: Prepara AppDir (#36 PR-B)
      # Assembla l'AppDir dagli asset COMMITTATI (packaging/appimage/) + il binario PyInstaller.
      # Struttura AppImage standard: AppRun (launcher) + <icona>.png + <app>.desktop nella root,
      # binario in usr/bin.
      run: |
        APP="XTrader-Signal-Bridge"
        mkdir -p AppDir/usr/bin
        cp "dist/$APP" "AppDir/usr/bin/$APP"
        chmod +x "AppDir/usr/bin/$APP"
        cp packaging/appimage/app-icon.png AppDir/app-icon.png
        cp packaging/appimage/app.desktop  AppDir/app.desktop
        cp packaging/appimage/AppRun        AppDir/AppRun
        chmod +x AppDir/AppRun

    - name: Scarica appimagetool (pin versione + verifica sha256)
      # appimagetool impacchetta il binario dentro l'AppImage → è supply-chain-sensibile:
      # versione PINNATA (tag immutabile) + verifica dell'hash PRIMA dell'uso. L'hash reale
      # viene stampato nel log e verificato contro il pin (bootstrap: si legge dal primo run
      # e si committa il valore). In CI il runner ha internet; la sandbox di sviluppo no.
      env:
        APPIMAGETOOL_VERSION: "1.9.0"
        APPIMAGETOOL_SHA256: "REPLACE_ME_DAL_PRIMO_RUN"
      run: |
        url="https://github.com/AppImage/appimagetool/releases/download/${APPIMAGETOOL_VERSION}/appimagetool-x86_64.AppImage"
        curl -fsSL -o appimagetool "$url"
        got="$(sha256sum appimagetool | cut -d' ' -f1)"
        echo "appimagetool ${APPIMAGETOOL_VERSION} sha256 scaricato: ${got}"
        if [ "${APPIMAGETOOL_SHA256}" = "REPLACE_ME_DAL_PRIMO_RUN" ]; then
          # BOOTSTRAP (temporaneo): l'hash non è ancora pinnato → NON blocca, così questo run
          # stampa l'hash reale sopra e prosegue a costruire l'AppImage (validazione completa).
          # Appena l'hash è pinnato, questo ramo sparisce e la verifica diventa OBBLIGATORIA.
          echo "::warning::BOOTSTRAP appimagetool: pinna APPIMAGETOOL_SHA256=${got} (poi rimuovi questo ramo)."
        else
          echo "${APPIMAGETOOL_SHA256}  appimagetool" | sha256sum -c - \
            || { echo "::error::sha256 di appimagetool NON combacia col pin. Atteso ${APPIMAGETOOL_SHA256}, ottenuto ${got}."; exit 1; }
        fi
        chmod +x appimagetool

    - name: Costruisci AppImage
      # `--appimage-extract-and-run`: evita la dipendenza da FUSE sul runner (che ubuntu-latest
      # non garantisce). Produce l'AppImage single-file, desktop-integrated (icona + .desktop).
      run: |
        ARCH=x86_64 ./appimagetool --appimage-extract-and-run AppDir "${{ steps.meta.outputs.artifact }}.AppImage"
        chmod +x "${{ steps.meta.outputs.artifact }}.AppImage"
        ls -la "${{ steps.meta.outputs.artifact }}.AppImage"

    - name: Carica l'AppImage come Artifact (scarica ed esegui)
      # L'AppImage è un SINGOLO file eseguibile con icona + voce di menu. Nota: come per ogni
      # artifact GitHub (zippato), il bit +x va perso al download → l'utente fa `chmod +x` una
      # volta e poi doppio-click / `./…AppImage` (flusso AppImage standard, documentato nel README).
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
      with:
        name: ${{ steps.meta.outputs.artifact }}
        path: ${{ steps.meta.outputs.artifact }}.AppImage
        retention-days: 7
