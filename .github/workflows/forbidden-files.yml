name: Forbidden Files

# Impedisce che finiscano nel repository segreti/artefatti: token o config reali,
# .env, CSV generati (eccetto il dizionario ufficiale), log, EXE, ZIP.
# Vedi le regole in CLAUDE.md / .gitignore.
on:
  pull_request:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  forbidden-files:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Controllo file vietati tracciati
        run: |
          # Segreti/artefatti vietati (allineato a .gitignore): .env, config.json,
          # *.secret, *.spec, *.exe, *.zip, *.log, *.bak e cartelle tracciate
          # build/ dist/ logs/ history/ (backup, log e dati utente locali).
          # Match case-insensitive (-i): blocca anche Config.json, .ENV, secret.EXE...
          bad=$(git ls-files | grep -iE '(^|/)\.env$|(^|/)config\.json$|\.(exe|zip|log|spec|secret|bak)$|(^|/)(build|dist|logs|history)/' || true)
          # CSV (estensione case-insensitive): ammesso SOLO il dizionario ufficiale.
          csv=$(git ls-files | grep -iE '\.csv$' | grep -vx 'data/dizionario_xtrader.csv' || true)
          if [ -n "$bad" ] || [ -n "$csv" ]; then
            echo "::error::File vietati tracciati nel repository:"
            [ -n "$bad" ] && echo "$bad"
            [ -n "$csv" ] && { echo "CSV non ammessi (solo data/dizionario_xtrader.csv è consentito):"; echo "$csv"; }
            exit 1
          fi
          # Scansione CONTENUTI: nessun token Telegram (formato bot "<id>:<35 char>")
          # in chiaro nei file tracciati. -Il elenca solo i path (token NON stampato).
          tok=$(git ls-files | xargs -r grep -IlE '[0-9]{8,10}:[A-Za-z0-9_-]{35}' 2>/dev/null || true)
          if [ -n "$tok" ]; then
            echo "::error::Possibile token Telegram in chiaro nei file tracciati (redatto):"
            echo "$tok"; exit 1
          fi
          echo "OK: nessun file vietato e nessun token in chiaro."
