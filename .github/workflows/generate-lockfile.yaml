name: Generate Windows Lockfile

# Genera il lockfile riproducibile con HASH per la build Windows dell'EXE, sulla
# stessa piattaforma in cui l'EXE viene compilato (windows-latest + Python 3.11), così
# le ruote (wheels) risolte e gli hash corrispondono davvero a ciò che la build installa.
# NB: il lock NON viene committato in automatico — viene caricato come ARTIFACT; lo si
# scarica e lo si committa a mano (vedi README, sezione "Dependency lockfile").

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "requirements.in"
      - "requirements-build.in"
      - "requirements-build.lock"
      - ".github/workflows/generate-lockfile.yaml"

permissions:
  contents: read

jobs:
  generate-windows-lockfile:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
        with:
          # Job di sola lettura (legge i .in, carica il lock): non serve il GITHUB_TOKEN
          # nel git config del worktree → difesa-in-profondità (chiude il finding zizmor
          # `artipacked`). NB: NON disabilitarlo in build.yaml, dove la release usa il token.
          persist-credentials: false

      - name: Set up Python 3.11
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Upgrade pip and install pip-tools
        # Pin del generatore per output deterministico: il formato del lock e la
        # risoluzione dipendono da pip-tools (e da pip). Senza pin, rigenerare dagli
        # stessi `.in` con un pip-tools più nuovo potrebbe cambiare l'output. Si pinna al
        # MAJOR stabile corrente (7.x); aggiorna il pin quando validi una nuova major.
        run: |
          python -m pip install --upgrade "pip>=24,<26"
          python -m pip install "pip-tools==7.*"

      - name: Validate COMMITTED lockfile install (se presente)
        # Una PR che committa SOLO `requirements-build.lock` (il passo "scarica artifact e
        # committa") deve essere validata su Windows PRIMA del merge: `build.yaml` gira solo
        # su push a main/tag, quindi senza questo step un lock malformato romperebbe la
        # release dopo il merge. Qui si valida il lock COMMITTATO così com'è, prima di
        # rigenerarlo sotto (Codex). Se il lock non c'è ancora, si salta.
        shell: pwsh
        run: |
          if (Test-Path "requirements-build.lock") {
            Write-Host "Valido il lockfile committato con --require-hashes."
            python -m pip install --require-hashes -r requirements-build.lock
          } else {
            Write-Host "requirements-build.lock non ancora committato: validazione saltata (verra' generato sotto)."
          }

      - name: Generate hashed Windows build lockfile
        run: pip-compile --generate-hashes --output-file requirements-build.lock requirements-build.in

      - name: Validate REGENERATED lockfile install
        run: python -m pip install --require-hashes -r requirements-build.lock

      - name: Upload generated lockfile
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: requirements-build-lock-windows-py311
          path: requirements-build.lock
          retention-days: 30
