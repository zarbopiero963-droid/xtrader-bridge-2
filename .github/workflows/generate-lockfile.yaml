name: Generate Windows Lockfile

# Genera il lockfile riproducibile con HASH per la build Windows dell'EXE, sulla
# stessa piattaforma in cui l'EXE viene compilato (windows-latest + Python 3.11), così
# le ruote (wheels) risolte e gli hash corrispondono davvero a ciò che la build installa.
# NB: il lock NON viene committato in automatico — viene caricato come ARTIFACT; lo si
# scarica e lo si committa a mano (vedi README, sezione "Dependency lockfile").

on:
  workflow_dispatch:
    inputs:
      verify_committed_lock:
        # Interruttore ESPLICITO per la verifica pre-release del lock committato (opzione "C").
        # DEFAULT off di proposito: l'altro caso d'uso del dispatch è RIgenerare un lock
        # rotto/stantio (vedi README), e in quel caso testare il vecchio lock lo farebbe
        # fallire PRIMA di generare/caricare il nuovo artifact — bloccando proprio il file
        # che serve per sistemarlo (Codex). Spunta questo SOLO quando il lock committato è
        # buono e vuoi collaudarlo prima di una release.
        description: "Collauda il requirements-build.lock committato com'è prima di rigenerarlo (verifica pre-release). LASCIA OFF se stai RIgenerando un lock rotto/stantio."
        type: boolean
        default: false
  pull_request:
    paths:
      # Tutta la catena single-source del lock: una modifica a QUALSIASI di questi file può
      # cambiare il set bloccato, quindi il lock va rigenerato/riconfrontato. `requirements.txt`
      # e `requirements-dev.txt` sono inclusi perché `requirements-build.in` ora deriva da
      # `-r requirements-dev.txt` (→ requirements.txt → requirements.in): aggiungere una
      # dipendenza di test lì DEVE ritriggerare la rigenerazione del lock.
      - "requirements.in"
      - "requirements.txt"
      - "requirements-dev.txt"
      - "requirements-build.in"
      - "requirements-build.lock"
      - ".github/workflows/generate-lockfile.yaml"

permissions:
  contents: read

jobs:
  generate-windows-lockfile:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
        with:
          # Job di sola lettura (legge i .in, carica il lock): non serve il GITHUB_TOKEN
          # nel git config del worktree → difesa-in-profondità (chiude il finding zizmor
          # `artipacked`). NB: NON disabilitarlo in build.yaml, dove la release usa il token.
          persist-credentials: false
          # Storia completa: serve a confrontare col commit base (guard anti-eliminazione).
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: "3.11"
          cache: "pip"

      - name: (dispatch) Testa il lock COMMITTATO così com'è, prima di rigenerarlo
        # Opzione "C": su esecuzione MANUALE valida il `requirements-build.lock` ESATTAMENTE
        # com'è committato nel repo — lo stesso file che `build.yaml` installerà — in un venv
        # PULITO con `--require-hashes`, poi esegue i test. Sta QUI di proposito, PRIMA dello
        # step "Genera il lockfile" che sovrascrive il file in place: dopo la rigenerazione si
        # validerebbe il lock rigenerato, non quello committato. Così un "API drift" di una
        # dipendenza pinnata si scopre on-demand invece che solo nella build di release.
        #   - Dietro l'input ESPLICITO `verify_committed_lock` (default off): l'ALTRO caso d'uso
        #     del dispatch è RIgenerare un lock rotto/stantio, e lì testare il vecchio lock lo
        #     farebbe fallire PRIMA di generare/caricare il nuovo artifact, bloccando proprio il
        #     file che serve per sistemarlo (Codex). Lo si attiva solo per il collaudo pre-release.
        #   - `hashFiles(...) != ''`: salta se il lock non è ancora committato (niente da testare).
        if: github.event_name == 'workflow_dispatch' && inputs.verify_committed_lock && hashFiles('requirements-build.lock') != ''
        shell: pwsh
        run: |
          python -m venv .lockcommitted
          if ($LASTEXITCODE -ne 0) { exit 1 }
          & ".lockcommitted\Scripts\python.exe" -m pip install --require-hashes -r requirements-build.lock
          # Controllo esplicito dell'install PRIMA dei test: senza, un install fallito seguito
          # da un pytest che esce 0 mascherebbe la validazione (pwsh riporta solo l'ultimo
          # exit code). Stessa logica della validazione del lock rigenerato più sotto.
          if ($LASTEXITCODE -ne 0) { exit 1 }
          & ".lockcommitted\Scripts\python.exe" -m pytest -m "not manual" -q

      - name: Rifiuta l'ELIMINAZIONE del lock una volta adottato
        # Se `requirements-build.lock` esiste sul branch base (è "adottato") ma è ASSENTE in
        # questa PR, è stato eliminato: il check anti-stantio sotto NON lo intercetta (pip-compile
        # lo ricrea come untracked e `git diff --exit-code` esce 0 sui file non tracciati, Codex).
        # Senza questo guard la PR mergerebbe senza lock e `build.yaml` tornerebbe all'install
        # legacy non bloccato. Su workflow_dispatch non c'è base PR → si salta.
        shell: pwsh
        run: |
          $base = "${{ github.event.pull_request.base.sha }}"
          if ($base) {
            git cat-file -e "${base}:requirements-build.lock" 2>$null
            # `git cat-file -e` esce 1 se il file NON è sul base: è il caso normale (lock non
            # ancora adottato) e NON deve far fallire la step → catturo l'esito e poi `exit 0`.
            $onBase = ($LASTEXITCODE -eq 0)
            if ($onBase -and -not (Test-Path "requirements-build.lock")) {
              Write-Error "requirements-build.lock è adottato sul branch base ma ASSENTE in questa PR: non eliminarlo (la build perderebbe il lock e tornerebbe all'install legacy non bloccato)."
              exit 1
            }
          }
          exit 0

      - name: Install pip-tools (versione ESATTA per output deterministico)
        # Pin ESATTO del generatore: lo stesso `.in` deve produrre lo stesso lock. Una
        # patch/minor di pip-tools (o di pip) può cambiare l'output o l'API interna, quindi
        # si pinnano ENTRAMBI come COPPIA compatibile (pip-tools usa l'internals di pip:
        # versioni disallineate danno errori tipo `make_resolver() ... use_pep517`).
        # Aggiorna questi pin DELIBERATAMENTE, validando la coppia, quando vuoi salire.
        # NB pwsh: la step riporta solo l'ULTIMO $LASTEXITCODE → controllo esplicito dopo
        # OGNI install, altrimenti un pin fallito ma seguito da un successo passerebbe (Codex).
        shell: pwsh
        run: |
          python -m pip install "pip==24.3.1"
          if ($LASTEXITCODE -ne 0) { exit 1 }
          python -m pip install "pip-tools==7.4.1"
          if ($LASTEXITCODE -ne 0) { exit 1 }

      - name: Genera il lockfile con hash (in place)
        # `--allow-unsafe`: include nel lock anche pip/setuptools/wheel (che pip-compile
        # altrimenti OMETTE), così l'ambiente di build è davvero completo e con hash —
        # PyInstaller richiede setuptools a runtime, e setup-python/venv ne seminano una
        # versione non pinnata che maschererebbe l'assenza dal lock (Codex).
        run: pip-compile --generate-hashes --allow-unsafe --output-file requirements-build.lock requirements-build.in

      - name: Upload generated lockfile
        # Caricato SUBITO dopo la generazione, PRIMA dei gate anti-stantio/validazione: così
        # il lock rigenerato è SEMPRE scaricabile come artifact anche quando il gate fallisce
        # (es. lock committato stantio) — è proprio quello che il messaggio d'errore e il README
        # dicono di scaricare e ricommittare (CodeRabbit). Il deletion-guard sopra resta un hard
        # stop prima della generazione, quindi qui un lock c'è sempre.
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: requirements-build-lock-windows-py311
          path: requirements-build.lock
          retention-days: 30

      - name: Fallisci se il lock committato è STANTIO
        # Se la PR ha committato un `requirements-build.lock`, la rigenerazione qui sopra
        # deve coincidere: altrimenti il repo conterrebbe un lock che NON corrisponde più ai
        # `.in`, e `build.yaml` lo userebbe dopo il merge (Codex). `git diff` confronta col
        # file committato; su un lock non ancora tracciato (prima volta) non c'è diff → passa.
        shell: pwsh
        run: |
          git diff --exit-code -- requirements-build.lock
          if ($LASTEXITCODE -ne 0) {
            Write-Error "requirements-build.lock NON corrisponde alla rigenerazione dai .in (lock stantio, o un upstream ha rilasciato una nuova versione). Riavvia 'Generate Windows Lockfile', scarica l'artifact e ricommitta il lock."
            exit 1
          }

      - name: Valida ed ESERCITA il lock in un venv PULITO
        # 1) Install in un venv NUOVO, isolato da pip-tools e dalle sue transitive: così un
        #    lock che ometta una dipendenza già presente nell'ambiente non passa qui per poi
        #    fallire nell'install "pulito" di build.yaml (Codex).
        # 2) ESERCITA il set bloccato eseguendo i test (come build.yaml): per i PR che toccano
        #    i `.in`/lock, intercetta un eventuale "API drift" di una dipendenza pinnata PRIMA
        #    del merge, invece di scoprirlo solo nella build di release post-merge (Codex).
        #    (Copertura completa su OGNI PR = job Windows separato: follow-up, vedi thread.)
        shell: pwsh
        run: |
          python -m venv .lockcheck
          if ($LASTEXITCODE -ne 0) { exit 1 }
          & ".lockcheck\Scripts\python.exe" -m pip install --require-hashes -r requirements-build.lock
          # Controllo esplicito: senza, un install fallito seguito da un pytest che esce 0
          # mascherebbe la validazione del lock (pwsh riporta solo l'ultimo exit code, Codex).
          if ($LASTEXITCODE -ne 0) { exit 1 }
          & ".lockcheck\Scripts\python.exe" -m pytest -m "not manual" -q
