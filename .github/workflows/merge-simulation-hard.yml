name: Merge Simulation Hard

# Verifica "dura" su Windows (target reale): merge con main, suite completa,
# safety/integration con stop al primo errore, build EXE e controllo file vietati.
# NON è eseguita su ogni push (sarebbe lenta): solo manuale o schedulata di notte,
# oppure prima di PR grosse/safety-critical/release.
on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"

permissions:
  contents: read

jobs:
  # P3-36 audit #76: il cron notturno girava OGNI notte su windows-latest (minuti 2×)
  # anche con zero commit dal giorno prima (~600+ min/mese potenzialmente a vuoto).
  # Guard economica su ubuntu: nella run SCHEDULATA, se l'ultimo commit del default
  # branch è più vecchio di 25h (margine sul cron delle 03:00), la hard-run è saltata.
  # FAIL-OPEN verso l'esecuzione: dispatch manuale sempre eseguito; output mancante o
  # errore del check → run eseguita comunque (mai copertura persa per un errore).
  fresh-commits-check:
    runs-on: ubuntu-latest
    outputs:
      has_new: ${{ steps.check.outputs.has_new }}
    steps:
      - id: check
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "${GITHUB_EVENT_NAME}" != "schedule" ]; then
            echo "has_new=true" >> "${GITHUB_OUTPUT}"
            exit 0
          fi
          # Data del PUSH (`pushed_at` dell'API repo), NON del commit (final review
          # Fable #87): un rebase/cherry-pick pushato oggi con committer-date vecchie
          # DEVE contare come lavoro nuovo. `pushed_at` copre i push su qualunque
          # branch → al limite si esegue una notte in più (direzione fail-open).
          # FAIL-OPEN totale: qualunque errore (rete/parse/API) → true → run eseguita.
          has_new="$(python3 -c "
          import datetime, json, os, urllib.request
          try:
              req = urllib.request.Request(
                  'https://api.github.com/repos/' + os.environ['GITHUB_REPOSITORY'],
                  headers={'Authorization': 'Bearer ' + os.environ['GH_TOKEN'],
                           'Accept': 'application/vnd.github+json'})
              data = json.load(urllib.request.urlopen(req, timeout=15))
              pushed = datetime.datetime.fromisoformat(
                  str(data['pushed_at']).replace('Z', '+00:00'))
              age = datetime.datetime.now(datetime.timezone.utc) - pushed
              print('true' if age.total_seconds() < 25 * 3600 else 'false')
          except Exception:
              print('true')   # fail-open: mai perdere la copertura per un errore
          " || echo true)"
          echo "has_new=${has_new}" >> "${GITHUB_OUTPUT}"
          if [ "${has_new}" = "false" ]; then
            echo "Nessun push nelle ultime 25h: hard-run notturna saltata (P3-36 #76)."
          fi

  hard:
    needs: fresh-commits-check
    # FAIL-OPEN completo (review GPT #87): senza `!cancelled()`, un job-guard FALLITO
    # (checkout/rete) farebbe skippare `hard` per dipendenza fallita, a dispetto
    # dell'if. Con `!cancelled()` la run parte anche a guard fallita (output vuoto →
    # != 'false'); `!= 'false'` (non == 'true') copre l'output vuoto a guard verde.
    if: ${{ !cancelled() && needs.fresh-commits-check.outputs.has_new != 'false' }}
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Simula merge con la base della PR (nessun merge reale)
        shell: bash
        run: |
          git config user.email "merge-simulation-hard@example.invalid"
          git config user.name "merge-simulation-hard"
          # Base reale della PR (gestisce master); manuale/schedulata → default branch.
          base="${{ github.event.pull_request.base.sha }}"
          if [ -z "$base" ]; then
            def="${{ github.event.repository.default_branch }}"
            git fetch origin "${def:-main}"
            base=FETCH_HEAD
          fi
          git merge --no-commit --no-ff "$base" \
            || { echo "::error::Conflitto di merge con la base della PR"; exit 1; }

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements*.txt
            requirements*.in
      - run: python -m pip install --upgrade pip
      - run: pip install -r requirements-dev.txt pyinstaller httpx

      - run: python -m compileall main.py xtrader_bridge tests
      # Prima le categorie critiche con stop al primo errore (early-fail reale),
      # poi la suite restante: niente doppia esecuzione di safety/integration.
      # Profilo release: esclusi i soli test live/manuali.
      - run: python -m pytest tests/safety -q --maxfail=1 -m "not manual"
      - run: python -m pytest tests/integration -q --maxfail=1 -m "not manual"
      # Tutto il resto (unit, smoke, e2e, slow/stress quando esisteranno), escluse
      # le categorie già girate sopra e i soli test live/manuali (profilo release).
      - run: python -m pytest -q -m "not manual" --ignore=tests/safety --ignore=tests/integration --ignore=tests/manual

      - name: Build EXE
        run: >
          pyinstaller --onefile --windowed
          --name "XTrader-Signal-Bridge"
          --paths .
          --collect-submodules xtrader_bridge
          --add-data "data/dizionario_xtrader.csv;data"
          --collect-all customtkinter
          --hidden-import=telegram
          --hidden-import=telegram.ext
          --hidden-import=telegram.ext._application
          --hidden-import=telegram.ext._updater
          --hidden-import=httpx
          --hidden-import=httpcore
          main.py

      - name: Controllo file vietati tracciati
        shell: bash
        run: |
          # Fonte di verità: .gitignore. File tracciati ma ignorati (eccezione
          # !data/dizionario_xtrader.csv onorata da git) + token Telegram in chiaro.
          ignored=$(git ls-files -i -c --exclude-standard)
          ci=$(git ls-files | grep -iE '(^|/)\.env$|(^|/)config\.json$|\.(exe|zip|log|spec|secret|bak)$' || true)
          csv=$(git ls-files | grep -iE '\.csv$' | grep -vx 'data/dizionario_xtrader.csv' || true)
          tok=$(git grep -lIE '[0-9]{8,10}:[A-Za-z0-9_-]{35}' -- . 2>/dev/null || true)
          if [ -n "$ignored$ci$csv$tok" ]; then
            echo "::error::File vietati o token in chiaro tracciati nel repo (token redatto):"
            echo "$ignored"; echo "$ci"; echo "$csv"; echo "$tok"; exit 1
          fi
          echo "OK: nessun file vietato e nessun token in chiaro."
