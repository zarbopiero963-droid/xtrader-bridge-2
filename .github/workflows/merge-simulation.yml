name: Merge Simulation

# Risponde a: "se questa PR venisse mergiata ORA su main, i test passerebbero
# ancora?". Fonde main nel branch della PR (senza commit/push reali) e rilancia
# compile + l'intera suite. Rileva anche i conflitti di merge con main.
on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  merge-simulation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Simula merge con la base della PR (nessun merge reale)
        run: |
          git config user.email "merge-simulation@example.invalid"
          git config user.name "merge-simulation"
          # Usa la BASE reale della PR (gestisce anche PR verso master). La base
          # SHA è già nello storico locale (checkout fetch-depth:0), quindi niente
          # fetch → nessun problema di credenziali con persist-credentials:false.
          base="${{ github.event.pull_request.base.sha }}"
          if [ -z "$base" ]; then
            def="${{ github.event.repository.default_branch }}"
            git fetch origin "${def:-main}"
            base=FETCH_HEAD
          fi
          git merge --no-commit --no-ff "$base" \
            || { echo "::error::Conflitto di merge con la base della PR"; exit 1; }

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-dev.txt
      - run: python -m pip install --upgrade pip
      - run: pip install -r requirements-dev.txt
      - run: python -m compileall main.py xtrader_bridge tests
      # Profilo PR: tutta la suite offline ESCLUSI i test live/manuali.
      - run: python -m pytest -q -m "not manual"
