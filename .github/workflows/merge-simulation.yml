name: Merge Simulation

# Risponde a: "se questa PR venisse mergiata ORA su main, i test passerebbero
# ancora?". Fonde main nel branch della PR (senza commit/push reali) e rilancia
# compile + l'intera suite. Rileva anche i conflitti di merge con main.
#
# RISPARMIO MINUTI (#billing): rigira l'INTERA suite offline (ridondante coi job di
# `pr-checks.yml` sul head del branch). Perciò NON gira più a ogni push di PR, ma solo
# quando serve il collaudo "come-se-mergiato": label di collaudo (`ci-full` o le label di
# review finale `final-fable-review`/`final-fugu-review`, che il proprietario lancia comunque
# pre-merge) oppure `workflow_dispatch`. Il rilevamento conflitti resta disponibile pre-merge
# via label; a merge reale i conflitti li mostra comunque git.
on:
  pull_request:
    types: [labeled]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  merge-simulation:
    # Su dispatch gira sempre; su PR solo se la label aggiunta è una di quelle di collaudo.
    if: >
      github.event_name != 'pull_request' ||
      contains(fromJSON('["ci-full","final-fable-review","final-fugu-review"]'), github.event.label.name)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Simula merge con la base della PR (nessun merge reale)
        run: |
          git config user.email "merge-simulation@example.invalid"
          git config user.name "merge-simulation"
          # Usa la BASE reale della PR (gestisce anche PR verso master). La base
          # SHA è già nello storico locale (checkout fetch-depth:0), quindi niente
          # fetch → nessun problema di credenziali con persist-credentials:false.
          base="${{ github.event.pull_request.base.sha }}"
          if [ -z "$base" ]; then
            def="${{ github.event.repository.default_branch }}"
            git fetch origin "${def:-main}"
            base=FETCH_HEAD
          fi
          git merge --no-commit --no-ff "$base" \
            || { echo "::error::Conflitto di merge con la base della PR"; exit 1; }

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements*.txt
            requirements*.in
      - run: python -m pip install --upgrade pip
      - run: pip install -r requirements-dev.txt
      - run: python -m compileall main.py xtrader_bridge tests
      # Profilo PR: tutta la suite offline ESCLUSI i test live/manuali (anche a
      # livello di collection, così un import-time error in tests/manual non blocca).
      - run: python -m pytest -q -m "not manual" --ignore=tests/manual
