name: PR Checks

# Check per categoria di rischio, eseguiti su OGNI pull request (oltre che su
# push verso main/master). Ogni job è un check GitHub separato e leggibile:
# se fallisce "safety" sai che è un rischio operativo, non uno stile/refactor.
#
# NB: la copertura Windows (`windows-tests`) è stata SPOSTATA nel workflow dedicato
# `windows-tests.yml` per risparmiare minuti Actions (windows-latest conta 2×): non gira
# più a ogni push di PR ma solo su push main / label di collaudo / dispatch. Qui restano i
# soli job ubuntu (1×), eseguiti a ogni push.
on:
  pull_request:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  compile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements*.txt
            requirements*.in
      - run: python -m pip install --upgrade pip
      - run: pip install -r requirements-dev.txt
      - run: python -m compileall main.py xtrader_bridge tests

  contract:
    # Barriera più importante: rompe se cambia il contratto CSV XTrader
    # (14 colonne in ordine fisso, BetType PUNTA/BANCA, Points vuoto, Handicap 0,
    # utf-8-sig + QUOTE_ALL). Vedi docs/xtrader_csv_contract.md.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements*.txt
            requirements*.in
      - run: python -m pip install --upgrade pip
      - run: pip install -r requirements-dev.txt
      - run: python -m pytest tests/unit/test_csv_contract.py -q -m "not manual"

  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements*.txt
            requirements*.in
      - run: python -m pip install --upgrade pip
      - run: pip install -r requirements-dev.txt
      # Esclude il contract test: quella barriera è coperta dal job dedicato `contract`.
      - run: python -m pytest tests/unit --ignore=tests/unit/test_csv_contract.py -q -m "not manual"

  safety:
    # Invarianti operative: niente riga pericolosa, niente stale signal,
    # scrittura atomica, gate del segnale coerente.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements*.txt
            requirements*.in
      - run: python -m pip install --upgrade pip
      - run: pip install -r requirements-dev.txt
      - run: python -m pytest tests/safety -q -m "not manual"

  integration:
    # Segnale → parser → mapping → riga CSV → file reale temporaneo.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements*.txt
            requirements*.in
      - run: python -m pip install --upgrade pip
      - run: pip install -r requirements-dev.txt
      - run: python -m pytest tests/integration -q -m "not manual"

  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements*.txt
            requirements*.in
      - run: python -m pip install --upgrade pip
      - run: pip install -r requirements-dev.txt
      - run: python -m py_compile main.py
      - run: python -m pytest tests/smoke -q -m "not manual"

  lint:
    # SOFT-WARNING (#311-3.5-c): ruff + mypy INFORMATIVI, NON bloccanti. Ogni step ha
    # `continue-on-error: true` → i problemi vengono SEGNALATI (annotazioni inline sui file della
    # PR via `--output-format=github`, più i log) ma il job resta VERDE e NON blocca il merge.
    # Adozione graduale su un codebase esistente, senza imporre un cleanup di massa. Gli strumenti
    # stanno in `requirements-lint.txt` (fuori dal lock di build EXE).
    runs-on: ubuntu-latest
    # `continue-on-error` sopprime il FALLIMENTO ma non il TEMPO: senza tetto, un hang (es. in
    # `pip install`) girerebbe fino al default 6h di GitHub, sprecando minuti runner (review
    # CodeRabbit). Il job lint dura pochi secondi; 10 min è ampiamente sufficiente. Stesso
    # safeguard di `windows-tests`.
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements*.txt
            requirements*.in
      - run: python -m pip install --upgrade pip
      - run: pip install -r requirements-lint.txt
      # ruff su tutto il package + test + entrypoint: intercetta import/variabili inutilizzati e
      # sintassi (select di default). Soft: `continue-on-error` non blocca; `--output-format=github`
      # pubblica le annotazioni inline sulle righe della PR.
      - name: ruff (soft-warning)
        continue-on-error: true
        run: ruff check --output-format=github xtrader_bridge tests main.py
      # mypy sui soli moduli PURI (logica senza GUI/IO pesante): baseline type-checked, oggi
      # pulita. Segnala una regressione di tipo su questi moduli senza bloccare.
      - name: mypy moduli puri (soft-warning)
        continue-on-error: true
        run: >
          mypy
          xtrader_bridge/numbers_re.py
          xtrader_bridge/recognition.py
          xtrader_bridge/validator.py
          xtrader_bridge/message_freshness.py
          xtrader_bridge/reconnect_policy.py
