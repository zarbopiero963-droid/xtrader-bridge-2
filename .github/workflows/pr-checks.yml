name: PR Checks

# Check per categoria di rischio, eseguiti su OGNI pull request (oltre che su
# push verso main/master). Ogni job è un check GitHub separato e leggibile:
# se fallisce "safety" sai che è un rischio operativo, non uno stile/refactor.
on:
  pull_request:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  compile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements*.txt
            requirements*.in
      - run: python -m pip install --upgrade pip
      - run: pip install -r requirements-dev.txt
      - run: python -m compileall main.py xtrader_bridge tests

  contract:
    # Barriera più importante: rompe se cambia il contratto CSV XTrader
    # (14 colonne in ordine fisso, BetType PUNTA/BANCA, Points vuoto, Handicap 0,
    # utf-8-sig + QUOTE_ALL). Vedi docs/xtrader_csv_contract.md.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements*.txt
            requirements*.in
      - run: python -m pip install --upgrade pip
      - run: pip install -r requirements-dev.txt
      - run: python -m pytest tests/unit/test_csv_contract.py -q -m "not manual"

  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements*.txt
            requirements*.in
      - run: python -m pip install --upgrade pip
      - run: pip install -r requirements-dev.txt
      # Esclude il contract test: quella barriera è coperta dal job dedicato `contract`.
      - run: python -m pytest tests/unit --ignore=tests/unit/test_csv_contract.py -q -m "not manual"

  safety:
    # Invarianti operative: niente riga pericolosa, niente stale signal,
    # scrittura atomica, gate del segnale coerente.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements*.txt
            requirements*.in
      - run: python -m pip install --upgrade pip
      - run: pip install -r requirements-dev.txt
      - run: python -m pytest tests/safety -q -m "not manual"

  integration:
    # Segnale → parser → mapping → riga CSV → file reale temporaneo.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements*.txt
            requirements*.in
      - run: python -m pip install --upgrade pip
      - run: pip install -r requirements-dev.txt
      - run: python -m pytest tests/integration -q -m "not manual"

  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements*.txt
            requirements*.in
      - run: python -m pip install --upgrade pip
      - run: pip install -r requirements-dev.txt
      - run: python -m py_compile main.py
      - run: python -m pytest tests/smoke -q -m "not manual"

  windows-tests:
    # Copertura Windows-specifica (Windows è il target principale del bridge): gira l'INTERA
    # suite non-manual su windows-latest a OGNI push/PR, così le regressioni che dipendono dal
    # SO (mutex vs flock, ACL/os.access, separatori di path, CRLF) sono intercettate in
    # automatico — proprio la classe di bug #311 che aveva rotto la build. NON compila né
    # carica l'EXE → nessun consumo di quota storage artifact (il build EXE completo resta
    # manuale/tag in `build.yaml`).
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements*.txt
            requirements*.in
      - run: python -m pip install --upgrade pip
      - run: pip install -r requirements-dev.txt
      - run: python -m pytest -m "not manual" -q
