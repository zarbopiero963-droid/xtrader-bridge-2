name: Windows Tests

# Copertura Windows-specifica (Windows è il target principale del bridge): gira l'INTERA
# suite non-manual su windows-latest, così le regressioni che dipendono dal SO (mutex vs
# flock, ACL/os.access, separatori di path, CRLF) sono intercettate — proprio la classe di
# bug #311 che aveva rotto la build.
#
# RISPARMIO MINUTI (#billing): `windows-latest` conta 2× i minuti Actions. Perciò questo job
# NON gira più a OGNI push di PR (dove prima stava dentro `pr-checks.yml`), ma solo quando
# serve davvero un collaudo Windows:
#   - push verso main/master → rete di sicurezza post-merge sul target reale;
#   - la PR ha una label di collaudo PRESENTE: `ci-full` (on-demand, senza chiamare i reviewer
#     a pagamento) oppure le label di review finale `final-fable-review`/`final-fugu-review`
#     (il gate pre-merge che il proprietario lancia comunque fa scattare anche Windows).
#     Finché la label resta sulla PR, ogni push successivo (`synchronize`) ri-collauda il head
#     reale — così non si merga mai un commit non testato su Windows;
#   - `workflow_dispatch` manuale.
# Su una PR SENZA label di collaudo il job non parte (nessun costo Windows). I core-check ubuntu
# (compile/contract/unit/safety/integration/smoke/lint) restano invece a OGNI push in
# `pr-checks.yml`: sono 1× e coprono la logica pura ad ogni commit. Il nome del check resta
# `windows-tests` (branch-protection invariata).
on:
  push:
    branches: [main, master]
  pull_request:
    types: [labeled, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: read

# P2-10 audit #76: le due label finali aggiunte insieme emettono DUE eventi `labeled` →
# senza concurrency partivano due run Windows identiche sullo stesso SHA (minuti 2×).
# Gruppo per PR (fallback: SHA per push su main/dispatch, così run di commit diversi non
# si cancellano mai tra loro) + cancel-in-progress: il doppione della coppia di label
# supera la prima run, e un push nuovo cancella la run ormai stantia del head precedente.
concurrency:
  group: windows-tests-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

jobs:
  windows-tests:
    # Su push/dispatch gira sempre; su PR (labeled/synchronize/reopened) solo se una label di
    # collaudo è PRESENTE ADESSO sulla PR — così un push DOPO la label ri-collauda il head reale
    # (non solo lo snapshot al momento dell'etichettatura), senza girare sulle PR senza label.
    if: >
      github.event_name != 'pull_request' ||
      contains(github.event.pull_request.labels.*.name, 'ci-full') ||
      contains(github.event.pull_request.labels.*.name, 'final-fable-review') ||
      contains(github.event.pull_request.labels.*.name, 'final-fugu-review')
    runs-on: windows-latest
    # Rete di sicurezza contro un hang Windows-specifico (es. un file-lock che non si
    # rilascia): senza timeout la run resterebbe appesa fino al default di 6h di GitHub.
    # La suite gira in ~1 min su windows-latest; 20 min è ampiamente sufficiente.
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements*.txt
            requirements*.in
      - run: python -m pip install --upgrade pip
      - run: pip install -r requirements-dev.txt
      - run: python -m pytest -m "not manual" -q
