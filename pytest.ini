[pytest]
testpaths = tests
# Timeout per-test (pytest-timeout, #311-3.5). Un test che si impianta (loop infinito,
# deadlock, join che non ritorna) viene ucciso con stack trace invece di appendere l'intera
# suite/CI. 120 s è ~44× il test più lento (~2.7 s), quindi nessun falso positivo, ma un vero
# hang non blocca più la CI. `thread` è il metodo CROSS-PLATFORM (Windows incluso, il target):
# il metodo `signal` userebbe SIGALRM, assente su Windows. Configurato via opzione ini e NON
# in `addopts`: se il plugin non è installato, l'opzione viene ignorata (nessun errore
# "unrecognized arguments"), mentre `--timeout` in addopts farebbe fallire il run.
timeout = 120
timeout_method = thread
# I marker di categoria sono applicati AUTOMATICAMENTE in base alla cartella del test
# (`tests/conftest.py`, `_DIR_MARKERS`): un test in `tests/integration/manual/...` è sia
# `integration` sia `manual`. Quindi `e2e`/`slow`/`manual` NON sono inutilizzati — sono il
# meccanismo per escludere categorie via `-m "not manual"` anche su sottocartelle future
# (audit L6). Vanno comunque dichiarati qui perché un marker non dichiarato è un warning.
markers =
    unit: test unitari veloci
    integration: test di integrazione offline
    safety: invarianti safety-critical (niente riga pericolosa/duplicata/segreti)
    smoke: import/compilazione/avvio base
    e2e: end-to-end offline (non richiesti a ogni commit)
    slow: test lenti, non richiesti a ogni commit
    manual: test che richiedono sistemi live/manuali (Telegram/XTrader/EXE)
